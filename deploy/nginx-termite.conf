# 放在 nginx 的 http 上下文中。
limit_req_zone $binary_remote_addr zone=termite_push:10m rate=5r/m;

# 将下面的 location 放入博客 HTTPS server 块。
location = /termite-control/v1/push/confirm {
    limit_req zone=termite_push burst=2 nodelay;
    client_max_body_size 8k;
    access_log off;
    proxy_set_header Host localhost;
    proxy_set_header X-Forwarded-For "";
    proxy_pass http://unix:/run/termiters/termiters.sock:/v1/push/confirm;
}
